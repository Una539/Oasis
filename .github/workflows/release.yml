name: 'Release'

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  # Android 构建
  build-android:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: 'aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;27.0.11902837"

      - name: Setup Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install

      - name: Decode keystore
        run: |
          mkdir -p src-tauri/gen/android/app
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > src-tauri/gen/android/app/my-release-key.jks

      - name: Create keystore.properties
        run: |
          cat > src-tauri/gen/android/keystore.properties <<EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=my-release-key.jks
          EOF

      - name: Build Android
        run: pnpm tauri android build
        env:
          NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.0.11902837

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          retention-days: 1

  # macOS 构建
  build-macos:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - args: '--target aarch64-apple-darwin'
          - args: '--target x86_64-apple-darwin'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: 'aarch64-apple-darwin,x86_64-apple-darwin'

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: ${{ matrix.args }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-binary-${{ matrix.args == '--target aarch64-apple-darwin' && 'arm64' || 'x64' }}
          path: src-tauri/target/${{ matrix.args == '--target aarch64-apple-darwin' && 'aarch64-apple-darwin' || 'x86_64-apple-darwin' }}/release/bundle/dmg/**/*.dmg
          retention-days: 1

  # Windows 构建
  build-windows:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: ''

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: src-tauri/target/release/bundle/msi/**/*.msi
          retention-days: 1

  # Linux 构建
  build-linux:
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf rpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: ''

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundles
          path: |
            src-tauri/target/release/bundle/appimage/**/*.AppImage
            src-tauri/target/release/bundle/deb/**/*.deb
            src-tauri/target/release/bundle/rpm/**/*.rpm
          retention-days: 1

  # 发布（等待所有构建完成）
  publish:
    needs: [build-android, build-macos, build-windows, build-linux]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Rename release assets
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME#v}"
          mkdir -p renamed

          find artifacts -type f | while IFS= read -r file; do
            rel_path="${file#artifacts/}"
            artifact_name="${rel_path%%/*}"
            base_name="$(basename "$file")"
            ext="${base_name##*.}"
            stem="${base_name%.*}"
            target=""

            case "$base_name" in
              *.msi)
                target="renamed/oasis_${version}_win.msi"
                ;;
              *.dmg)
                if [[ "$artifact_name" == macos-binary-arm64* ]]; then
                  target="renamed/oasis_${version}_mac_arm64.dmg"
                else
                  target="renamed/oasis_${version}_mac_x64.dmg"
                fi
                ;;
              *.AppImage)
                target="renamed/oasis_${version}_linux_x64.AppImage"
                ;;
              *.deb)
                target="renamed/oasis_${version}_linux_x64.deb"
                ;;
              *.rpm)
                target="renamed/oasis_${version}_linux_x64.rpm"
                ;;
              *.apk)
                if [[ "$stem" == *arm64* ]]; then
                  target="renamed/oasis_${version}_android_arm64.apk"
                elif [[ "$stem" == *armeabi* ]]; then
                  target="renamed/oasis_${version}_android_armv7.apk"
                elif [[ "$stem" == *x86_64* ]]; then
                  target="renamed/oasis_${version}_android_x86_64.apk"
                elif [[ "$stem" == *x86* ]]; then
                  target="renamed/oasis_${version}_android_x86.apk"
                else
                  target="renamed/oasis_${version}_android_universal.apk"
                fi
                ;;
            esac

            if [[ -n "$target" ]]; then
              cp "$file" "$target"
            fi
          done

      - name: Display structure
        run: find renamed/ -type f | sort

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: renamed/**/*
          draft: true
          body_path: release-note.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
